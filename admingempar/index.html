<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#166534">
  <title>GEMPAR Panel Pusat - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/logo.png">
</head>
<body class="admin-body">
  <!-- Admin Header -->
  <header class="admin-header">
    <div class="container-wide" style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <h1>🌿 GEMPAR PANEL PUSAT</h1>
        <p>Kelurahan Warakas — 197 Anggota Jumantik</p>
      </div>
      <div style="font-size:14px;">
        <span style="margin-right:16px;">🔔</span>
        <span>👤 Admin</span>
      </div>
    </div>
  </header>

  <div class="container-wide" style="padding-top:20px; padding-bottom:40px;">
    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="icon">👥</div>
        <div class="value" id="stat-members">197</div>
        <div class="label">Anggota Total</div>
      </div>
      <div class="stat-card">
        <div class="icon">🗑️</div>
        <div class="value" id="stat-kg">0</div>
        <div class="label">kg Hari Ini</div>
      </div>
      <div class="stat-card">
        <div class="icon">💎</div>
        <div class="value" id="stat-gem">0</div>
        <div class="label">GEM Total</div>
      </div>
      <div class="stat-card">
        <div class="icon">🎁</div>
        <div class="value" id="stat-rewards">0</div>
        <div class="label">Reward Diklaim</div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <select id="filter-rw" onchange="filterTable()">
        <option value="">Semua RW</option>
        <option value="1">RW 001</option>
        <option value="2">RW 002</option>
        <option value="3">RW 003</option>
        <option value="4">RW 004</option>
        <option value="5">RW 005</option>
        <option value="6">RW 006</option>
        <option value="7">RW 007</option>
        <option value="8">RW 008</option>
        <option value="9">RW 009</option>
        <option value="10">RW 010</option>
        <option value="11">RW 011</option>
        <option value="12">RW 012</option>
        <option value="13">RW 013</option>
        <option value="14">RW 014</option>
      </select>
      <select id="filter-rt" onchange="filterTable()">
        <option value="">Semua RT</option>
      </select>
      <select id="filter-jabatan" onchange="filterTable()">
        <option value="">Semua Jabatan</option>
        <option value="Ketua RW">Ketua RW</option>
        <option value="Anggota RT">Anggota RT</option>
      </select>
      <select id="filter-status" onchange="filterTable()">
        <option value="">Semua Status</option>
        <option value="aktif">Aktif</option>
        <option value="nonaktif">Nonaktif</option>
      </select>
      <input type="text" id="search-input" placeholder="Cari nama atau GEM-ID..." oninput="filterTable()" style="flex:1; min-width:200px;">
      <button class="search-btn" onclick="filterTable()">🔍 Cari</button>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 320px; gap:20px;">
      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>GEM-ID</th>
              <th>Nama Lengkap</th>
              <th>RW</th>
              <th>RT</th>
              <th>Jabatan</th>
              <th>Grup</th>
              <th>GEM</th>
              <th>Status NIK</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="members-table">
            <!-- Generated by JS -->
          </tbody>
        </table>
        <div style="display:flex; justify-content:center; align-items:center; gap:16px; margin-top:16px; padding:12px;">
          <button onclick="changePage(-1)" id="btn-prev" style="padding:8px 16px; border:none; background:var(--white); border-radius:8px; cursor:pointer; box-shadow:var(--shadow);">← Prev</button>
          <span id="pagination-info" style="font-size:14px; color:var(--gray-text);">Halaman 1 dari 8</span>
          <button onclick="changePage(1)" id="btn-next" style="padding:8px 16px; border:none; background:var(--white); border-radius:8px; cursor:pointer; box-shadow:var(--shadow);">Next →</button>
        </div>
      </div>

      <!-- Side Panels -->
      <div>
        <!-- Feed Aktivitas -->
        <div class="card" style="margin-bottom:16px;">
          <div style="font-size:16px; font-weight:700; margin-bottom:12px;">📢 FEED AKTIVITAS</div>
          <div id="feed-list" style="font-size:13px; line-height:2; color:var(--gray-text);">
            <div>• Belum ada aktivitas</div>
          </div>
        </div>

        <!-- Milestone Tracker -->
        <div class="card">
          <div style="font-size:16px; font-weight:700; margin-bottom:12px;">🏆 MILESTONE TRACKER</div>
          <div id="milestone-tracker">
            <!-- Generated by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="../js/data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
